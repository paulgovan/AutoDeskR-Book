project:
  type: book
  output-dir: docs
  post-render: fix-epub.py

book:
  title: "R for AEC Data Analysis"
  author: "Paul Govan"
  cover-image: cover.png
  repo-url: https://github.com/paulgovan/AutoDeskR-Book
  repo-actions: [issue]
  open-graph: true
  sharing: [twitter, facebook, linkedin]
  chapters:
    - index.qmd
    - part: "Front Matter"
      chapters:
        - motivation.qmd
        - acknowledgements.qmd
        - about.qmd
    - part: "Getting Started"
      chapters:
        - getting-started.qmd
    - part: "AutoDesk Platform Services"
      chapters:
        - authentication.qmd
        - data-management.qmd
        - model-derivative.qmd
        - design-automation.qmd
        - reality-capture.qmd
        - viewer.qmd
    - part: "3D Geometry & Meshes"
      chapters:
        - mesh-reading.qmd
        - mesh-metrics.qmd
        - mesh-visualisation.qmd
        - point-cloud-analysis.qmd
        - mesh-comparison.qmd
    - part: "DWG & DXF Analytics"
      chapters:
        - layer-analysis.qmd
        - attribute-extraction.qmd
        - cross-drawing-comparison.qmd
        - drawing-reports.qmd
    - part: "Digital Twins"
      chapters:
        - tandem-overview.qmd
        - sensor-streams.qmd
        - live-dashboards.qmd
    - part: "AI Integration"
      chapters:
        - mcp-server.qmd
    - part: "Reference"
      chapters:
        - case-study.qmd
        - reference.qmd
        - troubleshooting.qmd
    - references.qmd

execute:
  freeze: auto
  warning: false
  message: false

bibliography: references.bib

format:
  html:
    theme:
      light: cosmo
      dark: darkly
  pdf:
    documentclass: scrreprt
    classoption: [oneside]
    geometry:
      - paperwidth=6in
      - paperheight=9in
      - top=0.75in
      - bottom=0.75in
      - inner=0.875in
      - outer=0.625in
    fontsize: 11pt
    colorlinks: true
    linkcolor: bookblue
    urlcolor: bookblue
    citecolor: bookblue
    toc: true
    toc-depth: 2
    number-sections: true
    fig-width: 4.5
    fig-height: 4.5
    fig-cap-location: bottom
    fig-format: png
    fig-dpi: 300
    linestretch: 1.15
    code-overflow: wrap
    fig-pos: "H"
    highlight-style: tango
    include-in-header: latex/preamble.tex
  epub:
    cover-image: cover.jpg
    toc: true
    toc-depth: 2
    number-sections: false
    epub-chapter-level: 1
    fig-cap-location: bottom
    highlight-style: tango
    css: epub.css
    filters:
      - filters/epub-fix.lua

lang: en-US
date: "2026-06-18"
publisher: "Paul Govan"
description: "A practical guide to analyzing AEC and CAD/BIM data in R with the AutoDeskR package and AutoDesk Platform Services."

editor: visual

  author: "Paul Govan"
  date: "4/22/2026"
  cover-image: cover.svg
  chapters:
    - index.qmd
    - part: "Front Matter"
      chapters:
        - motivation.qmd
        - getting-started.qmd
        - acknowledgements.qmd
        - license.qmd
    - part: "Core APIs"
      chapters:
        - authentication.qmd

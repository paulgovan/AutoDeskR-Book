project:
  type: book
  output-dir: docs

book:
  title: "R for the Built Environment"
  author: "Paul Govan"
  date: "4/22/2026"
  cover-image: cover.png
  repo-url: https://github.com/paulgovan/AutoDeskR-Book
  repo-actions: [issue]
  downloads: [pdf, epub]
  open-graph: true
  sharing: [twitter, facebook, linkedin]
  chapters:
    - index.qmd
    - part: "Front Matter"
      chapters:
        - motivation.qmd
        - acknowledgements.qmd
        - license.qmd
    - part: "Getting Started"
      chapters:
        - getting-started.qmd
    - part: "AutoDesk Platform Services"
      chapters:
        - authentication.qmd
        - data-management.qmd
        - model-derivative.qmd
        - design-automation.qmd
        - reality-capture.qmd
        - viewer.qmd
    - part: "3D Geometry & Meshes"
      chapters:
        - mesh-reading.qmd
        - mesh-metrics.qmd
        - mesh-visualisation.qmd
        - point-cloud-analysis.qmd
        - mesh-comparison.qmd
    - part: "DWG & DXF Analytics"
      chapters:
        - layer-analysis.qmd
        - attribute-extraction.qmd
        - cross-drawing-comparison.qmd
        - drawing-reports.qmd
    - part: "Digital Twins"
      chapters:
        - tandem-overview.qmd
        - sensor-streams.qmd
        - live-dashboards.qmd
    - part: "AI Integration"
      chapters:
        - mcp-server.qmd
    - part: "Reference"
      chapters:
        - case-study.qmd
        - reference.qmd
        - troubleshooting.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme:
      light: cosmo
      dark: darkly
  pdf:
    documentclass: scrreprt
    classoption: [oneside]
    geometry: margin=1in
    fontsize: 11pt
    colorlinks: true
    linkcolor: bookblue
    urlcolor: bookblue
    citecolor: bookblue
    toc: true
    toc-depth: 2
    number-sections: true
    fig-width: 6.5
    fig-height: 4.5
    code-overflow: wrap
    highlight-style: tango
    include-in-header: latex/preamble.tex
  epub:
    cover-image: cover.png
    toc: true
    toc-depth: 2
    number-sections: false
    epub-chapter-level: 1
    css: epub.css
    filters:
      - filters/epub-fix.lua

editor: visual

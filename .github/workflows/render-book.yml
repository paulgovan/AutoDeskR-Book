name: Render Book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC — refreshes frozen API output

# Allow the render/live-api jobs to push the rendered docs/ and refreshed _freeze/
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            AutoDeskR
            testthat

      - name: Run tests
        run: Rscript -e "testthat::test_dir('tests/testthat')"

  render:
    runs-on: ubuntu-latest
    # Only render when _freeze/ exists (populated by a developer with credentials)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Check freeze directory exists
        id: check_freeze
        run: |
          if [ -d "_freeze" ] && [ "$(ls -A _freeze)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::_freeze/ is empty — skipping render. Run quarto render locally with credentials first and commit _freeze/."
          fi

      - uses: r-lib/actions/setup-r@v2
        if: steps.check_freeze.outputs.exists == 'true'
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        if: steps.check_freeze.outputs.exists == 'true'
        with:
          packages: |
            knitr
            rmarkdown

      - uses: quarto-dev/quarto-actions/setup@v2
        if: steps.check_freeze.outputs.exists == 'true'

      # HTML only: PDF/EPUB need headless Chrome (mermaid + rgl widgets), which
      # hangs on the runner. Those are built locally and committed to docs/.
      - name: Render book (HTML)
        if: steps.check_freeze.outputs.exists == 'true'
        run: quarto render --to html

      - name: Upload rendered book
        if: steps.check_freeze.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: book-html
          path: docs/

      - name: Commit rendered book
        if: steps.check_freeze.outputs.exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: render book [skip ci]"
          git push

  live-api:
    # Runs weekly with real credentials to refresh frozen output
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: github.event_name == 'schedule'
    env:
      client_id: ${{ secrets.AUTODESK_CLIENT_ID }}
      client_secret: ${{ secrets.AUTODESK_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            AutoDeskR
            knitr
            rmarkdown

      - uses: quarto-dev/quarto-actions/setup@v2

      # HTML only refreshes _freeze/ without the Chrome-dependent PDF/EPUB build.
      - name: Render with live API (HTML — refreshes _freeze/)
        run: quarto render --to html

      - name: Commit refreshed freeze output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _freeze/ docs/
          git diff --staged --quiet || git commit -m "chore: refresh frozen API output and docs [skip ci]"
          git push

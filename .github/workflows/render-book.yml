name: Render Book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC — refreshes frozen API output

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Install test dependencies
        run: Rscript -e "install.packages(c('AutoDeskR', 'testthat'), repos = 'https://cloud.r-project.org')"

      - name: Run tests
        run: Rscript -e "testthat::test_dir('tests/testthat')"

  render:
    runs-on: ubuntu-latest
    # Only render when _freeze/ exists (populated by a developer with credentials)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Check freeze directory exists
        id: check_freeze
        run: |
          if [ -d "_freeze" ] && [ "$(ls -A _freeze)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::warning::_freeze/ is empty — skipping render. Run quarto render locally with credentials first and commit _freeze/."
          fi

      - uses: r-lib/actions/setup-r@v2
        if: steps.check_freeze.outputs.exists == 'true'
        with:
          r-version: "4.4"

      - name: Install render dependencies
        if: steps.check_freeze.outputs.exists == 'true'
        run: Rscript -e "install.packages('AutoDeskR', repos = 'https://cloud.r-project.org')"

      - uses: quarto-dev/quarto-actions/setup@v2
        if: steps.check_freeze.outputs.exists == 'true'

      - name: Render book (uses frozen output)
        if: steps.check_freeze.outputs.exists == 'true'
        run: quarto render

      - name: Upload rendered book
        if: steps.check_freeze.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: book-html
          path: docs/

  live-api:
    # Runs weekly with real credentials to refresh frozen output
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      client_id: ${{ secrets.AUTODESK_CLIENT_ID }}
      client_secret: ${{ secrets.AUTODESK_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"

      - name: Install render dependencies
        run: Rscript -e "install.packages('AutoDeskR', repos = 'https://cloud.r-project.org')"

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render with live API (refreshes _freeze/)
        run: quarto render

      - name: Commit refreshed freeze output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _freeze/
          git diff --staged --quiet || git commit -m "chore: refresh frozen API output"
          git push

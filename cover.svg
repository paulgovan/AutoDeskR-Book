<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2400" width="1600" height="2400">
  <!-- Blueprint: dark navy with CAD grid and green accents -->
  <defs>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1e3a5f" stroke-width="1"/>
    </pattern>
    <pattern id="grid-major" width="400" height="400" patternUnits="userSpaceOnUse">
      <path d="M 400 0 L 0 0 0 400" fill="none" stroke="#1e4a7a" stroke-width="1.5"/>
    </pattern>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091526"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="2400" fill="url(#bg-grad)"/>
  <rect width="1600" height="2400" fill="url(#grid)"/>
  <rect width="1600" height="2400" fill="url(#grid-major)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1600" height="8" fill="#6aaa2a"/>

  <!-- CAD drawing elements — isometric cube wireframe -->
  <g transform="translate(800, 900)" filter="url(#glow)" opacity="0.7">
    <!-- Cube top face -->
    <polygon points="0,-280 280,-140 0,0 -280,-140" fill="none" stroke="#6aaa2a" stroke-width="2.5"/>
    <!-- Cube left face -->
    <polygon points="-280,-140 0,0 0,280 -280,140" fill="none" stroke="#6aaa2a" stroke-width="2.5"/>
    <!-- Cube right face -->
    <polygon points="280,-140 0,0 0,280 280,140" fill="none" stroke="#6aaa2a" stroke-width="2.5"/>
    <!-- Internal lines -->
    <line x1="0" y1="-280" x2="0" y2="0" stroke="#6aaa2a" stroke-width="1" opacity="0.4"/>
    <line x1="-280" y1="140" x2="280" y2="-140" stroke="#6aaa2a" stroke-width="1" opacity="0.4"/>
    <!-- Dimension ticks -->
    <line x1="310" y1="-155" x2="310" y2="155" stroke="#4a8a1a" stroke-width="1.5"/>
    <line x1="295" y1="-155" x2="325" y2="-155" stroke="#4a8a1a" stroke-width="1.5"/>
    <line x1="295" y1="155" x2="325" y2="155" stroke="#4a8a1a" stroke-width="1.5"/>
  </g>

  <!-- Crosshair / target circle -->
  <g transform="translate(800, 900)" opacity="0.25">
    <circle cx="0" cy="0" r="380" fill="none" stroke="#6aaa2a" stroke-width="1" stroke-dasharray="12 8"/>
    <line x1="-420" y1="0" x2="420" y2="0" stroke="#6aaa2a" stroke-width="0.8"/>
    <line x1="0" y1="-420" x2="0" y2="420" stroke="#6aaa2a" stroke-width="0.8"/>
  </g>

  <!-- Title (two lines) -->
  <text x="800" y="1360" font-family="'Courier New', Courier, monospace" font-size="104" font-weight="bold"
        fill="#ffffff" text-anchor="middle" letter-spacing="-1">R and the</text>
  <text x="800" y="1470" font-family="'Courier New', Courier, monospace" font-size="104" font-weight="bold"
        fill="#ffffff" text-anchor="middle" letter-spacing="-1">AutoDesk Platform</text>

  <!-- Green underline -->
  <rect x="120" y="1500" width="1360" height="6" fill="#6aaa2a" rx="3"/>

  <!-- Subtitle -->
  <text x="800" y="1558" font-family="'Courier New', Courier, monospace" font-size="40"
        fill="#7ab8e8" text-anchor="middle" letter-spacing="5">AUTODESKR PACKAGE GUIDE</text>

  <!-- Author -->
  <text x="800" y="2280" font-family="'Courier New', Courier, monospace" font-size="52"
        fill="#aac8e0" text-anchor="middle" letter-spacing="2">Paul Govan</text>

  <!-- Bottom bar -->
  <rect x="0" y="2360" width="1600" height="40" fill="#6aaa2a" opacity="0.8"/>

  <!-- Corner marks (CAD style) -->
  <g stroke="#6aaa2a" stroke-width="2" opacity="0.5">
    <line x1="60" y1="40" x2="60" y2="110"/>
    <line x1="40" y1="60" x2="110" y2="60"/>
    <line x1="1540" y1="40" x2="1540" y2="110"/>
    <line x1="1490" y1="60" x2="1560" y2="60"/>
    <line x1="60" y1="2360" x2="60" y2="2290"/>
    <line x1="40" y1="2340" x2="110" y2="2340"/>
    <line x1="1540" y1="2360" x2="1540" y2="2290"/>
    <line x1="1490" y1="2340" x2="1560" y2="2340"/>
  </g>
</svg>
